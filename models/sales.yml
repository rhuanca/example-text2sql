name: product_sales
dialect: sqlite

# Logical tables. Mapped from the Snowflake semantic view sv_product_sales:
#   fact_sales  <- VW_NCR_OLO_TRANSACTION_LEVEL_DETAIL
#   dim_store   <- VW_FRANCONNECT_PROFILES
#   fact_budget <- VW_SWS_BUDGET
tables:
  - name: fact_sales
    table: fact_sales
    grain: "one row per product line per transaction"
    description: >
      Combined in-store (NCR/POS) and online (OLO) product-level transaction
      detail. One order has many rows. Use item_net_sales for line-additive
      revenue and COUNT(DISTINCT transaction_id) for distinct order counts.
  - name: dim_store
    table: dim_store
    primary_key: store_id
    description: >
      Store/franchise master dimension. One row per store. Geography, ownership
      type, and lifecycle status. Join key to all other tables: store_id.
  - name: fact_budget
    table: fact_budget
    grain: "one row per store per calendar day"
    description: >
      Planned daily net sales targets. One row per store per day. Aggregate
      separately from fact_sales and join on store_id + date for budget vs actual.

relationships:
  - { from: fact_sales.store_id, to: dim_store.store_id }
  - { from: fact_budget.store_id, to: dim_store.store_id }

dimensions:
  # ---- fact_sales ----
  - { table: fact_sales, name: product_name, column: product_name,
      synonyms: [item, product, sku name],
      sample_values: ["Cappuccino", "Americano", "Black Coffee"] }
  - { table: fact_sales, name: category_name, column: category_name,
      synonyms: [category, product category, item category],
      sample_values: ["Espresso Drinks", "Coffee", "Pastries"] }
  - { table: fact_sales, name: purchase_location, column: purchase_location,
      synonyms: [channel, sales channel, in-store vs online, where purchased],
      sample_values: ["At Shop", "Online"] }
  - { table: fact_sales, name: date, column: date, type: date,
      synonyms: [business date, transaction date, day] }
  - { table: fact_sales, name: iso_week, column: iso_week, type: number,
      synonyms: [week, week number] }
  - { table: fact_sales, name: iso_year, column: iso_year, type: number,
      synonyms: [year] }
  - { table: fact_sales, name: store_id, column: store_id,
      synonyms: [store, location, fc, store code, franchise code] }
  # ---- dim_store ----
  - { table: dim_store, name: market, column: market,
      synonyms: [market, area, territory],
      sample_values: ["Houston", "Dallas", "San Antonio"] }
  - { table: dim_store, name: region, column: region,
      synonyms: [region, division] }
  - { table: dim_store, name: state, column: state, synonyms: [state] }
  - { table: dim_store, name: corporate_franchise, column: corporate_franchise,
      synonyms: [ownership type, corp vs franchise, corporate vs franchise],
      sample_values: ["Corporate", "Franchise"] }
  - { table: dim_store, name: lifecycle_stage, column: lifecycle_stage,
      synonyms: [store status, lifecycle, operational status],
      sample_values: ["Open", "Temporarily Closed", "Terminated"] }

facts:
  - { table: fact_sales, name: item_net_sales, column: item_net_sales }
  - { table: fact_sales, name: quantity, column: quantity }
  - { table: fact_budget, name: budget_net_sales, column: budget_net_sales }
  # store_id is the budget join key; declared so the relationship validates.
  - { table: fact_budget, name: budget_store_id, column: store_id }

metrics:
  - name: total_net_sales
    table: fact_sales
    sql: "SUM(CASE WHEN transaction_deleted = 0 THEN item_net_sales ELSE 0 END)"
    synonyms: [sales, net sales, revenue, total sales, product sales]
  - name: units_sold
    table: fact_sales
    sql: "SUM(CASE WHEN transaction_deleted = 0 THEN quantity ELSE 0 END)"
    synonyms: [units, quantity sold, items sold, volume]
  - name: traffic
    table: fact_sales
    sql: >
      COUNT(DISTINCT CASE WHEN transaction_deleted = 0 AND transaction_return = 0
      THEN transaction_id END)
    synonyms: [orders, order count, checks, transactions, traffic]
  - name: total_budget
    table: fact_budget
    sql: "SUM(budget_net_sales)"
    synonyms: [budget, budgeted sales, sales target, budget target, plan]

examples:
  - question: "How is Cappuccino performing week over week?"
    ir:
      metrics: [total_net_sales, units_sold]
      dimensions: [product_name, iso_year, iso_week]
      filters: [{ field: product_name, op: "=", value: "Cappuccino" }]
      order_by: [{ field: iso_week, dir: asc }]
  - question: "Net sales by market last 30 days"
    ir:
      metrics: [total_net_sales]
      dimensions: [market]
      time: { field: date, last_n_days: 30 }
  - question: "Budget vs actual by store"
    ir:
      metrics: [total_net_sales, total_budget]
      dimensions: [store_id]
