name: qbo_finance
dialect: sqlite

# QuickBooks Online general-ledger export. See specs/004-qbo-poc/domain.md.
# The LLM never emits SQL; it only picks the metrics/dimensions/filters below.

tables:
  # Amount is a signed value stored as text (the compiler casts it); classification
  # lives on qbo_accounts and is reached by a join the engine resolves.
  - name: txn
    table: qbo_txn_consolidated
    grain: "one GL posting line (one transaction line hitting one account)"
    keys: [AccountID, Account_Number, Num]  # join keys + transaction id
    description: >
      Consolidated general-ledger transaction detail across all entities and
      transaction types. Revenue vs expense is a filter on classification.
  # invoices is aggregated separately from txn and joined on Entity (the fan-out
  # guard) for invoiced-vs-posted comparisons.
  - name: invoices
    table: qbo_invoices
    grain: "one invoice line"
    keys: [Entity]
    description: >
      Accounts-receivable sales invoice lines.
  - name: accounts
    table: qbo_accounts
    primary_key: [Id, Entity]   # composite: an account Id is unique only within a company
    description: >
      Chart of accounts: one row per account, carrying Classification
      (Revenue/Expense/Asset/Liability/Equity) and account type/subtype.
  - name: acct_hier
    table: hierarchy_by_account
    primary_key: AcctNum
    description: >
      Account-number rollup for P&L / financial-statement grouping (Lvl1-3).
  - name: class_hier
    table: hierarchy_by_class
    primary_key: Class
    description: >
      Class -> Department -> DepartmentCategory rollup.

relationships:
  # Composite join: an account Id is only unique *within* a company, so the
  # consolidated ledger must match on AccountID AND Entity. The upstream ETL
  # joins qbo_accounts on AccountID+Entity for the same reason.
  - from: txn.AccountID
    to: accounts.Id
    also:
      - txn.Entity = accounts.Entity
  - { from: txn.Account_Number, to: acct_hier.AcctNum }
  - { from: txn.Class, to: class_hier.Class }

dimensions:
  # ---- txn (qbo_txn_consolidated) ----
  - { table: txn, name: txn_date, column: Date, type: date,
      synonyms: [date, transaction date, posting date, day] }
  - { table: txn, name: txn_year, column: Year, type: year,
      synonyms: [year] }
  - { table: txn, name: txn_month, column: Month, type: month,
      description: "Numeric month of year 1-12, year-agnostic — for comparing the same month across years (e.g. Jan across 2025 and 2026).",
      synonyms: [month number, month of year] }
  - { table: txn, name: month, expr: "substr(Date, 1, 7)", type: month,
      description: "Calendar month as YYYY-MM (one bucket per month per year).",
      synonyms: [month, calendar month, year month, monthly],
      sample_values: ["2026-01", "2026-02"] }
  - { table: txn, name: txn_quarter, column: Quarter, type: quarter,
      synonyms: [quarter, qtr] }
  - { table: txn, name: week_number, column: Week, type: week,
      synonyms: [week, week number, week of year] }
  - { table: txn, name: entity, column: Entity,
      synonyms: [company, legal entity, subsidiary, book],
      sample_values: ["Northwind Inc.", "Contoso SAS"] }
  - { table: txn, name: transaction_type, column: TransactionType,
      synonyms: [txn type, type, transaction kind],
      sample_values: ["Invoice", "Bill", "Expense"] }
  - { table: txn, name: customer, column: Customer,
      synonyms: [client, buyer] }
  - { table: txn, name: vendor, column: Vendor,
      synonyms: [supplier, payee] }
  - { table: txn, name: class, column: Class,
      synonyms: [class, segment],
      sample_values: ["Retail", "Wholesale", "Online"] }
  - { table: txn, name: account_name, column: Account,
      synonyms: [account, gl account, ledger account],
      sample_values: ["Product Sales", "Rent Expense", "Payroll Expense"] }
  # ---- accounts (qbo_accounts), reached by join ----
  - { table: accounts, name: classification, column: Classification, additive: false,
      description: "P&L bucket: Revenue/Expense/Asset/Liability/Equity. Contrasting facts, not parts of a whole, so charts compare them rather than stack.",
      synonyms: [account classification, revenue vs expense, pnl bucket],
      sample_values: ["Revenue", "Expense", "Asset", "Liability", "Equity"] }
  - { table: accounts, name: account_type, column: AccountType,
      synonyms: [account type],
      sample_values: ["Income", "Expense", "Cost of Goods Sold"] }
  - { table: accounts, name: account_subtype, column: AccountSubType,
      synonyms: [account subtype, sub type] }
  # ---- acct_hier (hierarchy_by_account) ----
  - { table: acct_hier, name: acct_lvl1, column: Lvl1,
      synonyms: [statement section, top level account group, level 1],
      sample_values: ["Income", "Operating Expenses", "Cost of Sales"] }
  - { table: acct_hier, name: acct_lvl2, column: Lvl2,
      synonyms: [account group, level 2] }
  - { table: acct_hier, name: acct_lvl3, column: Lvl3,
      synonyms: [account subgroup, level 3] }
  # ---- class_hier (hierarchy_by_class) ----
  - { table: class_hier, name: department, column: Department,
      synonyms: [department, dept, cost center],
      sample_values: ["Store Operations", "Wholesale", "E-Commerce"] }
  - { table: class_hier, name: department_category, column: DepartmentCategory,
      synonyms: [department category, dept category] }
  # ---- invoices (qbo_invoices) ----
  - { table: invoices, name: invoice_date, column: Date, type: date,
      synonyms: [invoice date] }
  - { table: invoices, name: invoice_year, column: Year, type: year,
      synonyms: [invoice year] }
  - { table: invoices, name: invoice_month, column: Month, type: month,
      synonyms: [invoice month number, invoice month of year] }
  - { table: invoices, name: invoice_period, expr: "substr(Date, 1, 7)", type: month,
      description: "Calendar month as YYYY-MM for invoices.",
      synonyms: [invoice month, invoice calendar month, invoice period],
      sample_values: ["2026-01", "2026-02"] }
  - { table: invoices, name: item, column: SalesItemLineDetail_ItemRef_name,
      synonyms: [item, product, sku],
      sample_values: ["Espresso Beans", "Cold Brew Kit", "Mug"] }
  - { table: invoices, name: invoice_class, column: SalesItemLineDetail_ClassRef_name,
      synonyms: [invoice class] }

facts:
  # Measures only. Join/identity keys live on the tables (primary_key / keys).
  - { table: txn, name: amount, column: Amount }
  - { table: invoices, name: invoice_line_amount, column: Amount }
  - { table: invoices, name: invoice_qty, column: SalesItemLineDetail_Qty }

metrics:
  - name: total_amount
    table: txn
    sql: "SUM(CAST(Amount AS REAL))"
    synonyms: [amount, total, total amount, spend, revenue, expenses, net]
    unit: usd
  # net income = revenue - expense. Reads accounts.Classification for the sign, so
  # it declares that join (data stores expense amounts positive).
  - name: net_income
    table: txn
    sql: "SUM(CASE WHEN Classification = 'Revenue' THEN CAST(Amount AS REAL) ELSE -CAST(Amount AS REAL) END)"
    description: "Revenue minus expense (profit); positive amounts, sign flipped for expenses."
    synonyms: [net income, profit, net profit, bottom line, earnings]
    unit: usd
    joins: [accounts]
  - name: transaction_count
    table: txn
    sql: "COUNT(DISTINCT Num)"
    synonyms: [transactions, number of transactions, count, txn count]
    unit: count
  - name: invoiced_amount
    table: invoices
    sql: "SUM(CAST(Amount AS REAL))"
    synonyms: [invoiced, invoice amount, billed amount, invoiced sales]
    unit: usd
  - name: units_invoiced
    table: invoices
    sql: "SUM(CAST(SalesItemLineDetail_Qty AS REAL))"
    synonyms: [units, quantity invoiced, items invoiced]
    unit: count

# Verified queries: curated question -> known-good SEMANTIC SQL (over the virtual
# table qbo_finance). Fed to the planner as few-shot examples.
verified_queries:
  - question: "What was our total revenue?"
    sql: >
      SELECT total_amount FROM qbo_finance WHERE classification = 'Revenue'
  - question: "Show revenue by month"
    sql: >
      SELECT month, total_amount FROM qbo_finance
      WHERE classification = 'Revenue' GROUP BY month ORDER BY month
  - question: "Top 10 expense accounts"
    sql: >
      SELECT account_name, total_amount FROM qbo_finance
      WHERE classification = 'Expense' GROUP BY account_name
      ORDER BY total_amount DESC LIMIT 10
  - question: "Expenses by department"
    sql: >
      SELECT department, total_amount FROM qbo_finance
      WHERE classification = 'Expense' GROUP BY department
  - question: "Invoiced amount vs posted amount by entity"
    sql: >
      SELECT entity, invoiced_amount, total_amount FROM qbo_finance GROUP BY entity
  # a year-over-year pivot: one revenue column per year (was eval/verified_qbo.yml)
  - question: "compare revenue for jan, feb, and march between 2025 and 2026"
    sql: >
      SELECT txn_month,
        SUM(CASE WHEN txn_year = 2025 THEN total_amount END) AS revenue_2025,
        SUM(CASE WHEN txn_year = 2026 THEN total_amount END) AS revenue_2026
      FROM qbo_finance WHERE classification = 'Revenue' AND txn_month IN (1, 2, 3)
      GROUP BY txn_month ORDER BY txn_month
