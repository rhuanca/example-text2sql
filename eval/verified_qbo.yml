# Verified queries for the qbo_finance model: a curated natural-language question
# paired with known-good SQL, checked against demo_qbo.db.
#
# These exist for answer *shapes the IR can't express* — here, a year-over-year
# pivot with one revenue column per year (wide format). The IR/compiler produces
# long format (month, year, revenue); pivoting to columns is done in SQL, not the
# semantic model (see the WoW/YoY design decision in specs/004-qbo-poc).
#
# Verified by tests/test_qbo_model.py::TestVerifiedQueries.

verified_queries:
  - id: revenue-jan-feb-mar-2025-vs-2026
    question: "compare revenue for jan, feb, and march between 2025 and 2026"
    notes: >
      Two revenue columns side by side (revenue_2025, revenue_2026), one row per
      month. Revenue = classification-filtered total, so it joins qbo_accounts on
      the composite key (AccountID + Entity). Sums across both entities.
    sql: |
      SELECT
          CASE t.Month WHEN 1 THEN 'Jan' WHEN 2 THEN 'Feb' WHEN 3 THEN 'Mar' END AS month,
          SUM(CASE WHEN t.Year = 2025 THEN CAST(t.Amount AS REAL) ELSE 0 END) AS revenue_2025,
          SUM(CASE WHEN t.Year = 2026 THEN CAST(t.Amount AS REAL) ELSE 0 END) AS revenue_2026
      FROM qbo_txn_consolidated t
      JOIN qbo_accounts a
          ON t.AccountID = a.Id AND t.Entity = a.Entity
      WHERE a.Classification = 'Revenue'
        AND t.Month IN (1, 2, 3)
      GROUP BY t.Month
      ORDER BY t.Month
